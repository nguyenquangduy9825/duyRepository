<body>
    <h1>luyện code </h1>
    <script>var year=parseInt(prompt("nhập năm vào đây "));
if(year%4==0){
    alert("đây ko phải là năm nhuận ");
}else if(year%100==0){
    alert("đây ko phải năm nhuận ");
}else{
    alert("đây là năm nhuận ")
}
</script>
