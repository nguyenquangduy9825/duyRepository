<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="nhapvao" placeholder="nhập thêm phần tử vào đây ">
    <input type="button" onclick="add() " value="add">
    <input type="button" onclick="trave()" value="trave">
    <div id ="result"></div>
    <script>
       let x = 0;
let array = Array();
function add() {
    array[x] = document.getElementById("nhapvao").value;
    alert("Element: " + array[x] + " Added at index " + x);
    x++;
    document.getElementById("nhapvao").value = "";
}
function trave() {
    let e = "<hr/>";
    for (let i = 0; i < array.length; i++) {
        e += "Element " + i + " = " + array[i] + "<br/>";
    }
    document.getElementById("result").innerHTML = e;
}
    </script>
</body>
</html>
