<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Di chuyển quả bóng</title>
</head>
<body>
    <form>
        <img id="myImage" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Football_%28soccer_ball%29.svg" style="width: 200px;"/>
        
        <p>Click các nút dưới đây để di chuyển quả bóng:</p>
        
        <input type="button" value="< Sang Trái" onclick="moveLeft()" />
        <input type="button" value="Sang Phải >" onclick="moveRight()" />

        <script>
            let imgObj = null;

            function init() {
                imgObj = document.getElementById('myImage');
                imgObj.style.position = 'relative';
                imgObj.style.left = '0px';
            }

            // Hàm di chuyển sang phải
            function moveRight() {
                imgObj.style.left = parseInt(imgObj.style.left) + 10 + 'px';
            }

            // Hàm di chuyển sang trái
            function moveLeft() {
                imgObj.style.left = parseInt(imgObj.style.left) - 10 + 'px';
            }

            window.onload = init;
        </script>
    </form>
</body>
</html>
