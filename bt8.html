<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di chuyển Nobita</title>
    <style>
       
        #nobita {
            position: relative; 
            transition: 0.1s; 
            width: 100px;   
        }
    </style>
</head>
<body onload="docReady()">

    <img id="nobita" src="https://upload.wikimedia.org/wikipedia/vi/2/2c/Nobita.png" style="top:0px; left:0px;">
        
    <form>
        <input type="button" onclick="upArrowPressed()" value="lên">
        <input type="button" onclick="downArrowPressed()" value="xuống">
        <input type="button" onclick="leftArrowPressed()" value="trái">
        <input type="button" onclick="rightArrowPressed()" value="phải">
    </form>

    <script>
        function upArrowPressed() {
            let element = document.getElementById("nobita");
            element.style.top = (parseInt(element.style.top) || 0) - 10 + 'px';
        }
        function downArrowPressed() {
            let element = document.getElementById("nobita");
            element.style.top = (parseInt(element.style.top) || 0) + 10 + 'px';
        }
        function leftArrowPressed() {
            let element = document.getElementById("nobita");
            element.style.left = (parseInt(element.style.left) || 0) - 10 + 'px';
        }
        function rightArrowPressed() {
            let element = document.getElementById("nobita");
            element.style.left = (parseInt(element.style.left) || 0) + 10 + 'px';
        }

        function moveSelection(evt) {
            switch (evt.keyCode) {
                case 37: leftArrowPressed(); break;
                case 39: rightArrowPressed(); break;
                case 38: upArrowPressed(); break;
                case 40: downArrowPressed(); break;
            }
        }

        function docReady() {
            window.addEventListener('keydown', moveSelection);
        }
    </script>
</body>
</html>
