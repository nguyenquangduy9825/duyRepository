<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Room Toggle Light</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-900">

<div class="text-center">
    <div id="people" class></div>
  
  <!-- PHÒNG -->
  <div id="room" class="w-[420px] h-[520px] rounded-3xl overflow-hidden relative transition duration-700 shadow-2xl">

    <!-- nền -->
    <div id="bg" class="absolute inset-0 bg-gradient-to-b from-yellow-200 to-yellow-400 transition duration-700"></div>

    <!-- đèn treo -->
    <div id="light"
      class="absolute top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-yellow-300 rounded-full 
      shadow-[0_0_80px_40px_rgba(255,255,150,0.8)] transition duration-700">
    </div>

    <!-- ánh sáng lan -->
    <div id="glow" class="absolute top-0 left-1/2 -translate-x-1/2 w-[300px] h-[300px] bg-yellow-200 opacity-40 blur-3xl rounded-full transition duration-700"></div>

    <!-- giường -->
    <div class="absolute bottom-0 w-full h-44 bg-gray-300 rounded-t-3xl"></div>

    <!-- gối -->
    <div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-44 h-16 bg-white rounded-xl shadow"></div>

    <!-- người ngủ -->
    <div class="absolute bottom-28 left-1/2 -translate-x-1/2 w-32 h-16 bg-pink-300 rounded-full shadow-inner"></div>

    <!-- chăn -->
    <div class="absolute bottom-0 w-full h-32 bg-blue-400 rounded-t-3xl"></div>

    <!-- cửa sổ -->
    <div id="window" class="absolute top-16 right-6 w-20 h-20 bg-blue-200 rounded-lg transition duration-700"></div>

  </div>

  <!-- nút -->
  <button onclick="toggleLight()" 
    class="mt-6 px-6 py-2 bg-white text-black rounded-lg shadow hover:scale-105 transition">
    Bật / Tắt đèn
  </button>

</div>

<script>
let isOn = true;

function toggleLight() {
  const bg = document.getElementById("bg");
  const light = document.getElementById("light");
  const glow = document.getElementById("glow");
  const windowEl = document.getElementById("window");

  if (isOn) {
    // TẮT
    bg.classList.remove("from-yellow-200","to-yellow-400");
    bg.classList.add("from-blue-900","to-black");

    light.classList.remove("bg-yellow-300");
    light.classList.add("bg-gray-500");
    light.style.boxShadow = "none";

    glow.classList.add("opacity-0");

    windowEl.classList.remove("bg-blue-200");
    windowEl.classList.add("bg-blue-900");

  } else {
    // BẬT
    bg.classList.remove("from-blue-900","to-black");
    bg.classList.add("from-yellow-200","to-yellow-400");

    light.classList.remove("bg-gray-500");
    light.classList.add("bg-yellow-300");
    light.style.boxShadow = "0 0 80px 40px rgba(255,255,150,0.8)";

    glow.classList.remove("opacity-0");

    windowEl.classList.remove("bg-blue-900");
    windowEl.classList.add("bg-blue-200");
  }

  isOn = !isOn;
}
</script>

</body>
</html>
</body>
</html>
